# ============================================================
# 苏楚的个人博客 — Hugo 站点配置
# 主题：Blowfish
# ============================================================

baseURL = "https://sumingwong.github.io/"
theme = "blowfish"
defaultContentLanguage = "zh-cn"

enableRobotsTXT = true
summaryLength = 0
buildDrafts = false
buildFuture = false
enableEmoji = true

[pagination]
  pagerSize = 10

[imaging]
  anchor = "Center"

[taxonomies]
  tag = "tags"
  category = "categories"

[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

# ============================================================
# 中文语言配置
# ============================================================
[languages.zh-cn]
  disabled = false
  label = "简体中文"
  weight = 1
  title = "苏楚"

  [languages.zh-cn.params]
    displayName = "ZH"
    isoCode = "zh-CN"
    dateFormat = "2006-01-02"
    description = "苏楚的个人博客 — 心理学、游戏、阅读与思考。"
    copyright = "© 2026 苏楚"

    # 作者信息（显示在首页 hero/background 区域）
    [languages.zh-cn.params.author]
      name = "苏楚"
      headline = "心理学考研 · 游戏拆解 · 阅读思考"
      bio = "武汉大学心理学本科生，全职备考心理学312统考。这里记录我的考研日志、游戏与阅读的思考、以及科研学习笔记。"
      links = [
        { github = "https://github.com/sumingwong" },
      ]

# ============================================================
# 导航菜单
# ============================================================
[[languages.zh-cn.menus.main]]
  name = "日常"
  pageRef = "categories/daily"
  weight = 1

[[languages.zh-cn.menus.main]]
  name = "思考"
  pageRef = "categories/thinking"
  weight = 2

[[languages.zh-cn.menus.main]]
  name = "工作"
  pageRef = "categories/work"
  weight = 3

[[languages.zh-cn.menus.main]]
  name = "关于"
  pageRef = "about"
  weight = 4

[[languages.zh-cn.menus.main]]
  name = "标签"
  pageRef = "tags"
  weight = 5

# ============================================================
# Blowfish 主题参数
# ============================================================
[params]
  # 外观：默认亮色，允许切换
  colorScheme = "blowfish"
  defaultAppearance = "light"
  autoSwitchAppearance = true

  # 功能开关
  enableSearch = true
  enableCodeCopy = true
  enableStructuredBreadcrumbs = false

  # 页头布局
  [params.header]
    layout = "fixed"

  # 页脚
  [params.footer]
    showMenu = false
    showCopyright = true
    showThemeAttribution = true
    showAppearanceSwitcher = true
    showScrollToTop = true

  # 首页：background 布局（全宽背景图 + 个人信息 + 文章列表）
  [params.homepage]
    layout = "background"
    showRecent = true
    showRecentItems = 6
    showMoreLink = true
    showMoreLinkDest = "/posts/"
    cardView = true
    cardViewScreenWidth = false
    layoutBackgroundBlur = true
    homepageImage = "background.jpg"

  # 文章页
  [params.article]
    showDate = true
    showDateUpdated = false
    showAuthor = false
    showBreadcrumbs = true
    showDraftLabel = true
    showEdit = false
    showHeadingAnchors = true
    showPagination = true
    showReadingTime = true
    showTableOfContents = true
    showTaxonomies = true
    showCategories = true
    showTags = true
    showWordCount = true

  # 列表页
  [params.list]
    showBreadcrumbs = true
    showSummary = true
    showTableOfContents = false
    showCards = true
    groupByYear = true
    cardView = true

  # 分类/标签页
  [params.taxonomy]
    showTermCount = true
    cardView = true

  [params.term]
    groupByYear = true
    cardView = true

# ============================================================
# Markdown 渲染配置
# ============================================================
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
